<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Update Employee</title>
</head>
<body>
<div align="center">
    <h1>Update Employee</h1>

    <form action="#" th:action="@{/updateEmployee}" th:object="${employee}" method="post">

        ID:         <input type="text" th:field="*{id}"        placeholder="Employee Id" readonly><br><br>
        First Name: <input type="text" th:field="*{firstName}" placeholder="First Name"><br><br>
        Last Name:  <input type="text" th:field="*{lastName}"  placeholder="Last Name"><br><br>
        Email Id:   <input type="text" th:field="*{emailId}"   placeholder="Email"><br><br>

        <input type="submit" value="Update Employee">
        <a th:href="@{/}">Cancel</a>
    </form>
</div>
</body>
</html>
