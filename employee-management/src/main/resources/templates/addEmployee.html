<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add Employee</title>
</head>
<body>
<div align="center">
    <h1>Add New Employee</h1>

    <form action="#" th:action="@{/addEmployee}" th:object="${employee}" method="post">

        First Name: <input type="text" th:field="*{firstName}" placeholder="First Name"><br><br>
        Last Name:  <input type="text" th:field="*{lastName}"  placeholder="Last Name"><br><br>
        Email Id:   <input type="text" th:field="*{emailId}"   placeholder="Email"><br><br>

        <input type="submit" value="Save Employee">
        <a th:href="@{/}">Cancel</a>
    </form>
</div>
</body>
</html>
