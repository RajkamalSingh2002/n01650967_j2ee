<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${employee.id > 0 ? 'Edit Employee' : 'New Employee'}">Employee Form</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="content-container">
    <h2 th:text="${employee.id > 0 ? 'Update Employee' : 'Create New Employee'}"></h2>

    <form action="#" th:action="@{/employees/save}" th:object="${employee}" method="post">
        
        <!-- Hidden id field for updates -->
        <input type="hidden" th:field="*{id}" />

        <div class="form-group">
            <label for="firstName">First Name</label>
            <input type="text" id="firstName" th:field="*{firstName}" placeholder="First Name" />
            <div class="error" th:if="${#fields.hasErrors('firstName')}" th:errors="*{firstName}">First Name Error</div>
        </div>

        <div class="form-group">
            <label for="lastName">Last Name</label>
            <input type="text" id="lastName" th:field="*{lastName}" placeholder="Last Name" />
            <div class="error" th:if="${#fields.hasErrors('lastName')}" th:errors="*{lastName}">Last Name Error</div>
        </div>

        <div class="form-group">
            <label for="email">Email</label>
            <input type="text" id="email" th:field="*{email}" placeholder="Email" />
            <div class="error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}">Email Error</div>
        </div>

        <div class="actions">
            <button type="submit" class="btn btn-primary">Save Employee</button>
            <a th:href="@{/employees}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
