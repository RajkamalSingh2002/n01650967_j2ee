<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Employee List</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="content-container">
    <h2>All Employees</h2>

    <div class="actions-container" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <a th:href="@{/employees/new}" class="btn btn-primary">Add New Employee</a>
        <form th:action="@{/employees}" method="get" class="search-form" style="display: flex; gap: 10px; align-items: center;">
            <input type="number" name="searchId" placeholder="Search by ID" class="form-control" style="width: auto; margin: 0;" required>
            <button type="submit" class="btn btn-info" style="margin: 0;">Search</button>
            <a th:href="@{/employees}" class="btn btn-secondary" style="margin: 0;">Clear</a>
        </form>
    </div>
    
    <div th:if="${searchError}" class="alert alert-danger" style="margin-bottom: 20px; color: #721c24; background-color: #f8d7da; border: 1px solid #f5c6cb; padding: .75rem 1.25rem; border-radius: .25rem;" th:text="${searchError}"></div>

    <table class="employee-table">
        <thead>
        <tr>
            <th>ID</th>
            <th>First Name</th>
            <th>Last Name</th>
            <th>Email</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="emp : ${employees}">
            <td th:text="${emp.id}">1</td>
            <td th:text="${emp.firstName}">John</td>
            <td th:text="${emp.lastName}">Doe</td>
            <td th:text="${emp.email}">john.doe@example.com</td>
            <td>
                <a th:href="@{/employees/edit/{id}(id=${emp.id})}" class="btn btn-sm btn-info">Edit</a>
                <a th:href="@{/employees/delete/{id}(id=${emp.id})}" class="btn btn-sm btn-danger" onclick="return confirm('Are you sure you want to delete this employee?');">Delete</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
